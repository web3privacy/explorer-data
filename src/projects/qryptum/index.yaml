privacy_policy:
  defined: true
  link: https://qryptum.eth.limo/site/#/privacy
  data_usage: No data is collected. Vault operations run entirely on-chain, OTP
    proofs are generated locally on your device, and no server ever sees your
    keys, proofs, or personal information.
compliance: Qryptum is a non-custodial, open-source Ethereum protocol with no
  admin keys, no custody of user funds, and all activity fully verifiable
  on-chain.
tracebility:
  kyc: false
  tracked_data: Qryptum collects no user data. No IP, no email, no location, no
    wallet tracking. Everything runs on-chain and locally in your browser.
  sign_in_type_requirments:
    - wallet
default_privacy: false
audits: []
third_party_dependency: Qryptum's core vault (QryptSafeV6) has no dependency on
  any third-party service. QryptShield integrates Railgun ZK routing (testnet
  only), and the $QRYPT token uses Uniswap liquidity on mainnet. No oracles, no
  Chainlink, no external price feeds.
social_trust: Qryptum has no DAO and no multisig. The protocol is governed by
  its immutable smart contracts with zero admin keys. No individual, team, or
  governance body can modify, pause, or access deployed vaults.
technical_spof: >+
  There are no admin keys to steal and no data to leak. To compromise the
  protocol, an attacker would need to simultaneously break keccak256 (requiring
  a quantum computer beyond current capability), steal a user's Ethereum private
  key, AND obtain their OTP proof chain, all at the same time. No single point
  of failure exists.


description: >-
  A provider of privacy focused, high quality web services.


  Offers VPS, DNS, Managed Hosting (Sysadmin) services, and Dedicated servers.


  Other than what language you wish for support to be provided in, requires no
  information on signup, not even an email address. 

  Does not engage in KYC or any privacy invasion practices, including for
  refunds. Supports communication via Matrix, an encrypted open source chat
  service.


  Fully owns own hardware, and is continually working towards being independent
  from third parties where possible.

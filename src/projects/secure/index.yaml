description: >-
  Secure is a fully serverless, privacy-first messaging platform built on Tor
  hidden services, designed for true peer-to-peer communication with zero
  centralized infrastructure.


  Unlike traditional messaging apps, Secure does not rely on servers, relays, or
  push notification systems. Messages are transmitted directly between devices
  over the Tor network, eliminating third-party intermediaries and significantly
  reducing metadata exposure. There are no phone numbers, emails, or accounts
  required—identity is created and stored locally on the user’s device.


  The platform leverages advanced cryptography, including post-quantum hybrid
  key exchange and forward secrecy, ensuring long-term protection against both
  current and future threats. All data is encrypted at rest, and communication
  is end-to-end encrypted by default.


  Key features include:


  Serverless P2P messaging over Tor hidden services

  No accounts, phone numbers, or email required

  Post-quantum encryption with forward secrecy

  Private group messaging with no central coordination layer

  Metadata-minimizing architecture by design

  Cross-platform support (iOS and Android)

  Secure local storage with encrypted database

  Secure Pay (multi-chain): Send and receive cryptocurrency across multiple
  blockchains directly within the app, with privacy-first design and no
  custodial control


  Secure is built for users who demand maximum privacy, censorship resistance,
  and control over their data. By removing centralized points of failure and
  operating entirely over Tor, Secure provides a communication layer that cannot
  be easily surveilled, blocked, or shut down.

social_trust: ""
technical_spof: >-
  Secure is designed to avoid traditional single points of failure.


  There is no central server, message database, push server, admin dashboard, or
  relay system that can be hacked, seized, or shut down to compromise the entire
  network.


  To shut down or compromise Secure at scale, an attacker would need to
  compromise core external foundations such as:


  The Tor network itself

  The user’s individual device

  The user’s private keys

  The underlying cryptographic primitives

  The supported blockchain networks used by Secure Pay

  The user’s backup seed phrase


  Secure does not have:


  Platform-controlled user funds

  Custodial wallets

  Central message storage

  Master admin keys

  Central relay servers

  A global user database


  The main risk is endpoint compromise: if a user’s device, private keys, or
  seed phrase are stolen, that individual user’s data or funds may be at risk.

social_trust: The project is governed by a DAO using MetaDAO's futarchy-based
  governance model. Treasury funds are held and controlled through Squads
  multisig, with spending requiring DAO approval through MetaDAO. No single
  individual holds unilateral spending authority. Decisions are made through
  decision markets, where proposals are executed only if the market signals they
  will positively impact the protocol.

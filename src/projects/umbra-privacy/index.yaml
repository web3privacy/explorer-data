compliance: Yes. Umbra integrates Range for real-time sanctions screening
  against OFAC and other watchlists, blocking interactions with flagged
  addresses. For auditability and regulatory transparency, the protocol supports
  opt-in viewing keys — allowing users to selectively disclose transaction
  history to auditors or regulators without granting any spending authority.
  This design balances on-chain privacy with the ability to demonstrate
  compliance when required.

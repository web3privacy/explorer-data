description: Lumina Engine is a privacy-preserving transaction and trading
  infrastructure built on zero-knowledge systems. It enables users and
  applications to submit encrypted intents and generate client-side proofs,
  allowing transactions to be verified without exposing sensitive information
  such as trade parameters or strategy. Lumina focuses on enabling confidential
  execution while maintaining verifiability and compatibility with existing
  blockchain ecosystems.

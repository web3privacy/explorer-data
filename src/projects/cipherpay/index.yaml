description: >-
  CipherPay is a non-custodial Zcash payment processor built on shielded
  (Orchard) transactions. Every invoice gets a unique diversified address
  derived from the merchant's incoming viewing key, funds go directly to their
  wallet, CipherPay never holds or sees spending keys.


  Features:


  - Shopify and WooCommerce plugins

  - Standalone checkout page and REST API

  - Event ticketing with capacity management

  - x402 and MPP protocol support for API paywalls

  - MCP integration for AI agent payments

  - Real-time payment detection via trial decryption

  - 1% per transaction, no monthly fees


  Built in Rust. Fully open source. Shielded by default,both sides of every
  transaction stay private.

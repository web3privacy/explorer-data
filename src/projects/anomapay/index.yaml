description: AnomaPay is a private payments application built on Anoma. It makes
  it easy to pay anyone privately with any existing asset on public blockchains
  like Ethereum. AnomaPay expands upon the design of Zcash to support private
  transfers of any asset natively on existing blockchains, instead of needing to
  use specific privacy coins or privacy chains.  AnomaPay  works with existing
  wallets and requires no new software. It's non-custodial, and assets are
  always natively secured by their underlying blockchain.

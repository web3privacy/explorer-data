description: |-
  Okkult is a zero-knowledge privacy infrastructure 
  built natively on Ethereum. It enables any user to 
  prove compliance, shield assets, vote privately, 
  and verify identity without revealing sensitive 
  information to anyone.

  Before any operation, users generate a ZK compliance 
  proof verified against OFAC sanctions data and the 
  Chainalysis on-chain oracle entirely in the browser, 
  with no server involvement. Assets are then shielded 
  in an encrypted UTXO pool powered by Groth16 ZK proofs. 
  Transactions route through a native Railgun integration 
  at railgun.okkult.eth sender mathematically hidden.

  Six modules: Okkult Proof, Shield, Relay, Vote, ID, Mail.
  Non-custodial. Immutable. Open source. MIT licensed.

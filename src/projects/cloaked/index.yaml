description: Cloaked is a new kind of self-custodial crypto wallet with stealth
  addresses at its core. Users can seamlessly create fresh, unlinkable addresses
  for payments or interacting with apps, so they do not expose their entire
  onchain history every time they use a protocol. These addresses can also be
  combined with Privacy Pools for stronger public-facing anonymity without
  sacrificing UX.

third_party_dependency: >-
  Base L2 network (Coinbase/Base) for all on-chain settlement. 

  snarkjs library for Groth16 ZK proof generation and verification. 

  Ethereum L1 security inherited via Base's optimistic rollup bridge with 7-day
  challenge window.
social_trust: No DAO, no multisig, no formal governance structure. The protocol
  contracts are immutable after deployment — no admin key can modify pool logic
  or access user funds. The deployer wallet has no special privileges
  post-deployment. Protocol frontend is maintained by the noctum-privacy GitHub
  organization.
technical_spof: The withdrawal relayer is the primary operational dependency —
  if the relayer is offline, users cannot submit withdrawals (funds remain safe
  in pool contracts and can be withdrawn when relayer recovers). The API server
  (noctum.io/api) is required for the web interface but not for direct contract
  interaction. Users with sufficient technical knowledge can interact with pool
  contracts directly on Base via any EVM-compatible client without using the
  relayer or API.

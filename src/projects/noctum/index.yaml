description: >-
  Noctum is a privacy infrastructure protocol deployed on Base (Ethereum Layer
  2, Chain ID 8453). It provides three core functions: anonymous ETH transfers
  using fixed-denomination pool contracts built on a commit-reveal scheme with
  Groth16 zero-knowledge proofs; zero-knowledge identity attestations that allow
  wallet owners to prove control of an address without revealing it; and
  real-time wallet security monitoring that scans any Base address for risk
  indicators and exposed ERC20 approvals.


  The anonymous transfer mechanism works as follows: a user deposits a fixed ETH
  amount into one of five denomination pools (0.001, 0.005, 0.01, 0.1, or 1.0
  ETH). A cryptographic commitment is stored on-chain instead of the depositor's
  address. The user later withdraws to any recipient address by submitting a ZK
  proof generated off-chain. A relayer broadcasts the withdrawal transaction, so
  the recipient wallet requires no prior ETH balance. All pool, factory, and
  verifier contracts are deployed and verified on Basescan. The protocol also
  exposes a public REST API and a TypeScript SDK (@noctum/sdk) for third-party
  developer integrations.

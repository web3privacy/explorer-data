third_party_dependency: Railgun ZK circuits (BN254/Groth16), Circle CCTP
  (cross-chain USDC transfers), Aave v4 (idle yield on shielded balances)
social_trust: ARM (tokenholder) DAO, with an accountable steward. The steward
  can pass treasury proposals by default, but is subject to veto, halt, and
  replacement by ARM holders at any time. Shielded pool core contracts are
  immutable, meaning no admin can alter them. Pause authority exists, but cannot
  block unshields, only new deposits.
technical_spof: A critical vulnerability in Railgun's inherited ZK circuits
  could lead to funds being stolen, and no admin action could retroactively
  protect shielded funds. Circle can blacklist USDC contract addresses, which
  could freeze funds held in the shielded pool.

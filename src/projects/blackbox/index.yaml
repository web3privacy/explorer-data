description: >-
  Blackbox is an open-source off-grid infrastructure stack for communication,
  local AI, and value transfer when normal internet access is unavailable.


  It combines mesh networking (LoRa / Meshtastic), local compute, messaging,
  node infrastructure, and Bitcoin-adjacent payment experiments into one
  autonomous system.


  Built for resilience scenarios such as outages, censorship, unstable networks,
  remote areas, and community-owned infrastructure.


  Core focus:


  * messaging without classic internet

  * local AI on owned hardware

  * mesh node coordination

  * low-bandwidth data transfer

  * experimental off-grid value exchange

  * self-hosted digital sovereignty


  Blackbox is not trying to replace the internet with speed or convenience. It
  is a backup layer that preserves critical functions when centralized
  infrastructure fails.


  FOSS, modular, hardware-friendly, and built for real-world constraints.

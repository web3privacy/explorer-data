description: Shielded transfers for any multichain wallet. Users shield
  transfers directly from any existing multichain wallet — no new app, no new
  address, no new workflow. NullMask sits between the wallet and the blockchain
  as a Virtual Private EVM Network, requiring zero SDK adoption from wallets.

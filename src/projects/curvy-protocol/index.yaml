description: >
  Curvy is the privacy infrastructure layer for on-chain payments - built for
  the wallets, applications, and AI agents.


  On the surface, users get human-readable usernames as a frictionless entry
  point for receiving crypto. Under the hood, every payment is automatically
  routed through programmable smart contracts using ZK proofs: a fresh address
  is generated per transaction, funds are shielded from balance exposure and
  transaction graph analysis, and time-based correlation attacks are prevented
  by design. The result is end-to-end cross-chain privacy with a user experience
  identical to a normal wallet transfer.


  What makes Curvy distinct is the combination of three properties no existing
  solution delivers together: invisible UX (privacy requires no action from the
  user or the agent), embedded compliance and adjustable infrastructure
  (wallets, DeFi apps, payment platforms, and AI agent frameworks integrate via
  SDK in minutes).

description: >-
  MIST Hidemi is a private on-chain payment app for sending and receiving USDC
  privately across multiple blockchains — Ethereum, Base, Arbitrum, Optimism,
  Polygon, and StarkNet — without leaving a transaction history.


  Users generate a private payment link, share it with anyone who needs to send
  them USDC, receive funds from any supported chain, and withdraw privately.
  Deposits and withdrawals are unlinkable, powered by ZK proofs. No sign-up, no
  email, no seed phrase required. Authentication uses WebAuthn passkeys
  (biometrics). Non-custodial: MIST never holds user funds.


  Built on zero-knowledge proof architecture and the compliance-first Privacy
  Pools model endorsed by Vitalik Buterin. Not a mixer. Zero tracking cookies or
  behavioral analytics. Open protocol with auditable smart contracts; users only
  pay standard gas fees.

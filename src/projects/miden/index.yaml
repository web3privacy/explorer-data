ecosystem:
  - ethereum
description: >-
  Miden is a zero-knowledge rollup built for high-throughput,
  privacy-preserving applications. Transaction execution and state are pushed to
  the client side, so users generate ZK proofs locally on their own devices and
  the network only verifies proofs of correct execution and state updates.
  Accounts and notes can be public or private, giving applications a hybrid
  privacy model with programmable, selective disclosure. Miden runs a
  STARK-based virtual machine and targets onchain finance that needs
  confidentiality at scale.
